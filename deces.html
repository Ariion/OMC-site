<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMC - Acte de Décès</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="deces.css">
    <link rel="stylesheet" href="patch-daltonien.css">
</head>
<body class="labo-body">
    <div class="interface-container">
        
        <aside class="sidebar">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; gap: 10px;">
                <a href="index.html" class="back-link" style="margin-bottom: 0;">← RETOUR</a>
                <button onclick="toggleTheme()" style="background: #1e293b; border: 1px solid #334155; color: white; cursor: pointer; padding: 4px 10px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
                    <span>🌓</span>
                    <span id="theme-text">Passer mode sombre</span>
                </button>
            </div>
            
            <h1 class="sidebar-title">CERTIFICAT DE DÉCÈS</h1>
            
            <div class="form-group">
                <label>Nom & Prénom du Défunt</label>
                <input type="text" id="patientName" oninput="up('d-nom', this.value)" placeholder="ex: John Doe">
            </div>

            <div class="form-group">
                <label>Date de Naissance</label>
                <input type="date" id="patientBirth" oninput="upDate('d-ddn', this.value)">
            </div>

            <div class="form-group">
                <label>Date & Heure du Décès</label>
                <div style="display: flex; gap: 5px;">
                    <input type="date" oninput="upDate('d-date', this.value)" style="flex: 2;">
                    <input type="time" oninput="up('d-heure', this.value)" style="flex: 1;">
                </div>
            </div>

            <div class="form-group">
                <label>Lieu du Décès</label>
                <input type="text" oninput="up('d-lieu', this.value)" placeholder="ex: Los Santos">
            </div>

            
            <div class="form-group">
                <label>Cause du Décès (Type)</label>
                <select id="cause-type" onchange="updateCausesSub(this.value)">
                    <option value="">-- Sélectionner --</option>
                    <option value="Neurologique">Neurologique</option>
                    <option value="Hémorragique">Hémorragique</option>
                    <option value="Infectieuse / Métabolique">Infectieuse / Métabolique</option>
                    <option value="Cardio-respiratoire">Cardio-respiratoire</option>
                    <option value="Traumatique">Traumatique</option>
                    <option value="Toxique">Toxique</option>
                </select>
            </div>

            <div class="form-group">
                <label>Précision de la cause</label>
                <select id="cause-precision" onchange="updateCauseFinale(this.value)">
                    <option value="">-- Attente type --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Docteur Signataire</label>
                <input type="text" oninput="upSignature(this.value)" placeholder="Nom du médecin">
            </div>

            <div class="actions-group">
    <button type="button" class="btn-image" onclick="try{sauvegarderPatientDepuisFormulaire()}catch(e){}; genererImage(this)">
        🖼️ GÉNÉRER L'IMAGE
    </button>
    <button id="discord-btn" class="btn-discord" onclick="try{sauvegarderPatientDepuisFormulaire()}catch(e){}; envoyerDiscord(this)">
        ENVOYER SUR DISCORD
    </button>
</div>
        </aside>

        <main class="preview-area">
            <div id="document">
                <div class="header-cert">
                    <img src="assets/logo_omc.png" alt="Logo" style="height: 60px;">
                    <div>
                        <div class="cert-tag">OCEAN MEDICAL CENTER</div>
                        <h1 class="cert-main-title">Certificat de décès</h1>
                    </div>
                </div>

                <div class="cert-grid">
                    <div class="cert-box"><label>Défunt</label><div id="d-nom" class="cert-val">...</div></div>
                    <div class="cert-box"><label>Naissance</label><div id="d-ddn" class="cert-val">...</div></div>
                    <div class="cert-box"><label>Date / Heure du décès</label><div class="cert-val"><span id="d-date">...</span> à <span id="d-heure">--:--</span></div></div>
                    <div class="cert-box"><label>Lieu</label><div id="d-lieu" class="cert-val">...</div></div>
                    <div class="cert-box" style="grid-column: span 2;"><label>Référence dossier</label><div id="d-ref" class="cert-val">#---</div></div>
                    <div class="cert-box" style="grid-column: span 2;"><label>Cause immédiate</label><div id="d-cause" class="cert-val">...</div></div>
                </div>

                <div class="cert-footer">
                    <div class="cert-signature">
                        Établi par :<br><br>
                        <span id="display-sig" style="font-family: 'Alex Brush', cursive; font-size: 26px;">Dr...</span>
                    </div>
                    <div class="round-stamp">
                        <img id="qr-ref" class="qr-code" src="" alt="QR">
                        <div>OMC MEDICAL CENTER</div>
                    </div>
                </div>
                <p class="legal-text">Ce certificat est établi sur la base des constatations cliniques. Toute reproduction ou usage de faux est passible de poursuites.</p>
            </div>
        </main>
    </div>

    <div id="image-popup" class="popup-overlay" style="display:none;">
        <div class="popup-content">
            <h3>Image Générée</h3>
            <input type="text" id="direct-link" readonly onclick="this.select()">
            <div class="popup-buttons"><button onclick="copyLink()">Copier</button><button onclick="closePopup()">Fermer</button></div>
            <img id="preview-img-result" src="" style="max-width: 100%; margin-top: 15px;">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
   <script>
var OMC_CONFIG = {
    webhook:      'https://discord.com/api/webhooks/1468221753372446720/g_ItYTLYSb3xDeyRjFrVEsHuIPhwibYEEZoHzfktlzRCCqlqvmG2W3Xv7HNtCLv_hc0K',
    captureId:    'document',
    nomPatientId: 'patientName',
    typeDoc:      'Acte de Décès',
    pageSource:   'deces.html',
    getThreadName: () => `🕯️ DÉCÈS - ${document.getElementById('d-nom')?.innerText || 'Inconnu'} (${new Date().toLocaleDateString('fr-FR')})`,
    getContent:    () => `📄 **Nouvel Acte de Décès enregistré**\n👤 Défunt : ${document.getElementById('d-nom')?.innerText || 'Inconnu'}`
};
</script>
<script src="generation.js"></script>
    <script src="deces.js"></script>
    <script type="module" src="global.js"></script>
</body>
</html>
