<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMC — Dispatch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a192f;--card:#112240;--accent:#38bdf8;--text:#ccd6f6;--dim:#8892b0;--bord:#1e3a5f}
html,body{min-height:100vh;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-y:auto}

/* CLAIR */
body.light{background:#e8edf3;color:#0f172a}
body.light .topbar{background:#dde4ed;border-color:#c2ccd9}
body.light .title{color:#0f172a}
body.light .card{background:#fff;border-color:#c2ccd9}
body.light .sn{color:#0f172a}
body.light .sn::placeholder{color:#94a3b8}
body.light .slot-row{border-color:#e2e8f0}
body.light .sadd{color:#94a3b8;border-color:#cbd5e1}
body.light .sadd:hover{border-color:var(--accent);color:var(--accent)}
body.light .acd{background:#f1f5f9;border-color:#c2ccd9}
body.light .aci{color:#0f172a;border-color:#e2e8f0}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:2px solid var(--bord);height:52px;padding:0 24px;display:flex;align-items:center;gap:12px}
a.back{color:var(--accent);text-decoration:none;font-size:.78rem;font-weight:700}
.vsep{width:1px;height:20px;background:var(--bord);flex-shrink:0}
.title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff}
.title em{color:var(--accent);font-style:normal}
#clock{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:2px}
.tr{margin-left:auto;display:flex;align-items:center;gap:8px}
#lsave{font-size:.7rem;color:var(--dim)}
button{cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:1px;border-radius:6px;padding:5px 13px;transition:.15s}
.btn-t{background:transparent;border:1px solid var(--bord);color:var(--dim)}
.btn-t:hover{border-color:var(--accent);color:var(--accent)}
.btn-s{background:var(--accent);border:none;color:#0a192f}
.btn-s:hover{background:#0ea5e9}
.btn-d{background:#5865f2;border:none;color:#fff}
.btn-d:hover{background:#4752c4}
.btn-r{background:transparent;border:1px solid var(--bord);color:var(--dim)}
.btn-r:hover{border-color:#f87171;color:#f87171}

/* PAGE */
.page{padding:28px 24px 72px;display:flex;flex-direction:column;align-items:center}
.inner{width:100%;max-width:1200px}
.sect{margin-bottom:28px}
.slbl{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.slbl::after{content:'';flex:1;height:1px;background:var(--bord)}
.ugrid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}

/* CARD */
.card{background:var(--card);border:1px solid var(--bord);border-radius:10px;overflow:hidden;transition:transform .15s,box-shadow .15s,opacity .15s}
.card.dragging{opacity:.45;transform:scale(.97);box-shadow:0 0 0 2px var(--accent)}
.card.drag-over{box-shadow:0 0 0 3px var(--accent);transform:scale(1.02)}
.ch{cursor:grab}
.ch:active{cursor:grabbing}
.ch{padding:11px 16px;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.u-a1{background:rgba(59,130,246,.12);color:#60a5fa;border-bottom:2px solid rgba(59,130,246,.3)}
.u-a2{background:rgba(239,68,68,.12);color:#f87171;border-bottom:2px solid rgba(239,68,68,.3)}
.u-a3{background:rgba(34,197,94,.12);color:#4ade80;border-bottom:2px solid rgba(34,197,94,.3)}
.u-a4{background:rgba(139,92,246,.12);color:#c084fc;border-bottom:2px solid rgba(139,92,246,.3)}
.u-a5{background:rgba(249,115,22,.12);color:#fb923c;border-bottom:2px solid rgba(249,115,22,.3)}
.u-a6{background:rgba(219,39,119,.12);color:#f472b6;border-bottom:2px solid rgba(219,39,119,.3)}
.u-bob{background:rgba(202,138,4,.12);color:#facc15;border-bottom:2px solid rgba(202,138,4,.3)}
.u-cen{background:rgba(124,58,237,.12);color:#a78bfa;border-bottom:2px solid rgba(124,58,237,.3)}
.u-rdv{background:rgba(71,85,105,.15);color:#94a3b8;border-bottom:2px solid rgba(71,85,105,.35)}
.u-frm{background:rgba(217,119,6,.12);color:#fbbf24;border-bottom:2px solid rgba(217,119,6,.3)}

/* SELECT STATUT unité */
.ssel{font-size:.63rem;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);color:inherit;min-width:72px;cursor:pointer;outline:none;font-family:'Inter',sans-serif}
.ssel option{background:#112240;color:#fff}

/* SLOTS */
.slots{padding:0}
.slot-row{display:flex;align-items:center;padding:8px 16px;gap:8px;border-bottom:1px solid rgba(30,58,95,.4);position:relative}
.slot-row:last-child{border-bottom:none}

/* INPUT NOM — cliquable */
.sn{flex:1;border:1px solid transparent;background:transparent;color:var(--text);font-family:'Inter',sans-serif;font-size:.83rem;font-weight:500;outline:none;min-width:0;padding:3px 6px;border-radius:4px;cursor:text}
.sn:hover{border-color:rgba(56,189,248,.2)}
.sn:focus{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.05);color:#fff}
.sn::placeholder{color:#475569;font-style:italic}

/* BOUTON SUPPRIMER */
.sdel{background:none;border:none;color:#475569;font-size:.8rem;padding:2px 5px;border-radius:3px;flex-shrink:0;line-height:1}
.sdel:hover{color:#f87171}

/* SELECT STATUT RDV */
.rsel{font-size:.63rem;font-weight:700;padding:2px 8px;border-radius:20px;border:none;cursor:pointer;outline:none;flex-shrink:0;font-family:'Inter',sans-serif}
.rsel option{background:#112240;color:#fff}
.s-occ{background:rgba(239,68,68,.15);color:#f87171}
.s-lib{background:rgba(34,197,94,.15);color:#4ade80}
.s-pau{background:rgba(251,191,36,.15);color:#fbbf24}

/* BOUTON AJOUTER */
.sadd{display:flex;align-items:center;justify-content:center;width:calc(100% - 32px);margin:6px 16px 12px;padding:5px 0;border-radius:6px;border:1px dashed rgba(30,58,95,.8);background:transparent;color:#475569;font-size:.72rem;font-family:'Inter',sans-serif}
.sadd:hover{border-color:var(--accent);color:var(--accent)}

/* DROPDOWN AUTOCOMPLETE */
.acd{position:fixed;background:#1a2e4a;border:1px solid var(--bord);border-radius:8px;z-index:9999;max-height:320px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.7);display:none;width:300px}
.aci{padding:11px 16px;font-size:.87rem;color:var(--text);cursor:pointer;border-bottom:1px solid rgba(30,58,95,.4);display:flex;align-items:center;justify-content:space-between;gap:12px}
.aci:last-child{border-bottom:none}
.aci:hover{background:var(--accent);color:#0a192f}
.aci-b{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.b-dispo{background:rgba(34,197,94,.2);color:#4ade80}
.b-occ{background:rgba(239,68,68,.2);color:#f87171}
.b-abs{background:rgba(100,116,139,.2);color:#94a3b8}
.aci:hover .aci-b{background:rgba(0,0,0,.2);color:inherit}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#0a192f;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:.9rem;letter-spacing:1px;padding:10px 20px;border-radius:7px;transform:translateY(60px);opacity:0;transition:.25s;z-index:9999;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}
.toast.err{background:#f87171;color:#fff}

@media(max-width:1100px){.ugrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:650px){.ugrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back">← RETOUR</a>
  <div class="vsep"></div>
  <div class="title"><em>OMC</em> — DISPATCH CENTRAL</div>
  <div class="vsep"></div>
  <div id="clock">--:--:--</div>
  <div class="tr">
    <span id="lsave"></span>
    <button class="btn-t" id="tbtn">🌓 <span id="ttxt">Mode clair</span></button>
    <button class="btn-s" id="sbtn">💾 Sauvegarder</button>
    <button class="btn-d" id="dbtn">📨 Discord</button>
    <button class="btn-r" id="rbtn">↺ Reset</button>
  </div>
</div>

<div class="page"><div class="inner">
  <div class="sect">
    <div class="slbl">Unités actives</div>
    <div class="ugrid" id="g-top"></div>
  </div>
  <div class="sect">
    <div class="slbl">Unités secondaires &amp; services</div>
    <div class="ugrid" id="g-bot"></div>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  DONNÉES
// ══════════════════════════════════════════
var EMPLOYES = [
  "Alejandro Sanchez","Anna White","Diana Coin","Ford D.Powell",
  "Gabriella Turner","Gregor Moss","León White","Logan Edderson",
  "Louis Brunelle","Lyrae Greystone","Nezy Frinx","Raül Menendes",
  "Tino Cruz","Tony Pirely","Valentina Oliviera","Bob Textor","John Mars","Lorenzo Coopers"
];

var empStatuts = {}; // { "Nom": "dispo"|"occ"|"abs" }

var CFG = [
  {id:'ambu1', lbl:'Ambu 1',     cls:'u-a1',  sts:['','Libre','Occupé','Pause'],         top:true},
  {id:'ambu2', lbl:'Ambu 2',     cls:'u-a2',  sts:['','Libre','Occupé','Pause'],         top:true},
  {id:'ambu3', lbl:'Ambu 3',     cls:'u-a3',  sts:['','Libre','Occupé','Pause'],         top:true},
  {id:'bob',   lbl:'Bobologie',  cls:'u-bob', sts:['','Libre','Occupé','Pause'],         top:true},
  {id:'cen',   lbl:'Centrale',   cls:'u-cen', sts:['','Station','Libre','Occupé'],       top:true},
  {id:'ambu4', lbl:'Ambu 4',     cls:'u-a4',  sts:['','Libre','Occupé','Pause'],         top:false},
  {id:'ambu5', lbl:'Ambu 5',     cls:'u-a5',  sts:['','Libre','Occupé','Pause'],         top:false},
  {id:'ambu6', lbl:'Ambu 6',     cls:'u-a6',  sts:['','Libre','Occupé','Pause'],         top:false},
  {id:'rdv',   lbl:'Rendez-vous',cls:'u-rdv', sts:null,                                  top:false},
  {id:'frm',   lbl:'Formation',  cls:'u-frm', sts:['','En cours','Terminée'],            top:false},
];

var state = {};

function initState() {
  state = {};
  CFG.forEach(function(u) {
    state[u.id] = u.id === 'rdv'
      ? { slots: [{nom:'', stat:'Occupé'}, {nom:'', stat:'Occupé'}] }
      : { status:'', slots: ['',''] };
  });
}

// ══════════════════════════════════════════
//  HORLOGE
// ══════════════════════════════════════════
function tick() {
  var n = new Date();
  var p = function(x){ return String(x).padStart(2,'0'); };
  document.getElementById('clock').textContent = p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
  setTimeout(tick, 1000);
}
tick();

// ══════════════════════════════════════════
//  THÈME
// ══════════════════════════════════════════
document.getElementById('tbtn').addEventListener('click', function() {
  document.body.classList.toggle('light');
  var isL = document.body.classList.contains('light');
  localStorage.setItem('omc-theme', isL ? 'light' : 'dark');
  document.getElementById('ttxt').textContent = isL ? 'Mode sombre' : 'Mode clair';
});
if (localStorage.getItem('omc-theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('ttxt').textContent = 'Mode sombre';
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
// ══════════════════════════════════════════
//  DRAG & DROP — swap de cartes
// ══════════════════════════════════════════
var dragSrcId = null;  // id de l'unité en cours de drag

function activerDrag(cardEl, uid) {
  // ── SOURIS ──
  cardEl.setAttribute('draggable', 'true');

  cardEl.addEventListener('dragstart', function(e) {
    dragSrcId = uid;
    cardEl.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', uid);
  });

  cardEl.addEventListener('dragend', function() {
    dragSrcId = null;
    cardEl.classList.remove('dragging');
    document.querySelectorAll('.card').forEach(function(c){ c.classList.remove('drag-over'); });
  });

  cardEl.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragSrcId && dragSrcId !== uid) cardEl.classList.add('drag-over');
  });

  cardEl.addEventListener('dragleave', function() {
    cardEl.classList.remove('drag-over');
  });

  cardEl.addEventListener('drop', function(e) {
    e.preventDefault();
    cardEl.classList.remove('drag-over');
    var srcId = e.dataTransfer.getData('text/plain') || dragSrcId;
    if (!srcId || srcId === uid) return;
    swapUnits(srcId, uid);
  });

  // ── TACTILE (mobile) ──
  var touchStartX, touchStartY, clone, moved;

  cardEl.addEventListener('touchstart', function(e) {
    var header = cardEl.querySelector('.ch');
    if (!e.target.closest('.ch')) return; // drag seulement depuis le header
    moved = false;
    dragSrcId = uid;
    var t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;

    // Créer un fantôme visuel
    clone = cardEl.cloneNode(true);
    clone.style.cssText = 'position:fixed;z-index:9999;opacity:.8;pointer-events:none;width:'+cardEl.offsetWidth+'px;transform:scale(1.04);box-shadow:0 8px 32px rgba(0,0,0,.6);border:2px solid var(--accent);border-radius:10px;';
    clone.style.left = (t.clientX - cardEl.offsetWidth/2) + 'px';
    clone.style.top  = (t.clientY - 30) + 'px';
    document.body.appendChild(clone);
    cardEl.style.opacity = '.4';
  }, {passive:true});

  cardEl.addEventListener('touchmove', function(e) {
    if (!dragSrcId || dragSrcId !== uid) return;
    moved = true;
    var t = e.touches[0];
    if (clone) {
      clone.style.left = (t.clientX - parseInt(clone.style.width)/2) + 'px';
      clone.style.top  = (t.clientY - 30) + 'px';
    }
    // Highlight la carte sous le doigt
    document.querySelectorAll('.card').forEach(function(c){ c.classList.remove('drag-over'); });
    var el = document.elementFromPoint(t.clientX, t.clientY);
    if (el) {
      var target = el.closest('.card');
      if (target && target !== cardEl) target.classList.add('drag-over');
    }
    e.preventDefault();
  }, {passive:false});

  cardEl.addEventListener('touchend', function(e) {
    if (!dragSrcId || dragSrcId !== uid) return;
    if (clone) { clone.remove(); clone = null; }
    cardEl.style.opacity = '';
    document.querySelectorAll('.card').forEach(function(c){ c.classList.remove('drag-over'); });

    if (!moved) { dragSrcId = null; return; }

    var t = e.changedTouches[0];
    var el = document.elementFromPoint(t.clientX, t.clientY);
    if (el) {
      var target = el.closest('.card');
      if (target && target !== cardEl) {
        var targetId = target.getAttribute('data-uid');
        if (targetId) swapUnits(uid, targetId);
      }
    }
    dragSrcId = null;
  }, {passive:true});
}

function swapUnits(idA, idB) {
  // On échange uniquement les POSITIONS dans les grilles
  // En permutant les éléments DOM directement — plus simple et sans bug
  var cardA = document.querySelector('.card[data-uid="'+idA+'"]');
  var cardB = document.querySelector('.card[data-uid="'+idB+'"]');
  if (!cardA || !cardB) return;

  var parentA = cardA.parentNode;
  var parentB = cardB.parentNode;
  var nextA   = cardA.nextSibling;
  var nextB   = cardB.nextSibling;

  // Swap DOM
  if (nextA === cardB) {
    parentA.insertBefore(cardB, cardA);
  } else if (nextB === cardA) {
    parentB.insertBefore(cardA, cardB);
  } else {
    parentA.insertBefore(cardB, nextA);
    parentB.insertBefore(cardA, nextB);
  }

  // Re-activer le drag sur les cartes échangées (data-uid inchangé)
  // Rien à faire — les event listeners sont déjà attachés

  var lblA = cardA.querySelector('.ch span') ? cardA.querySelector('.ch span').textContent : idA;
  var lblB = cardB.querySelector('.ch span') ? cardB.querySelector('.ch span').textContent : idB;
  toast('🔄 ' + lblA + ' ↔ ' + lblB);
}

function renderAll() {
  var gTop = document.getElementById('g-top');
  var gBot = document.getElementById('g-bot');
  gTop.innerHTML = '';
  gBot.innerHTML = '';
  CFG.forEach(function(u) {
    var card = buildCard(u);
    if (u.top) gTop.appendChild(card);
    else       gBot.appendChild(card);
  });
}

function buildCard(u) {
  var s = state[u.id];
  var card = el('div','card');

  // — Header —
  var hdr = el('div','ch '+u.cls);
  var lbl = el('span'); lbl.textContent = u.lbl;
  hdr.appendChild(lbl);

  if (u.sts) {
    var sel = el('select','ssel');
    u.sts.forEach(function(v) {
      var o = document.createElement('option');
      o.value = v; o.textContent = v || '—';
      if (v === (s.status||'')) o.selected = true;
      sel.appendChild(o);
    });
    (function(uid, selEl) {
      selEl.addEventListener('change', function() {
        state[uid].status = selEl.value;
      });
    })(u.id, sel);
    hdr.appendChild(sel);
  }
  card.appendChild(hdr);

  // — Slots —
  var body = el('div','slots');
  if (u.id === 'rdv') {
    s.slots.forEach(function(r, i) {
      body.appendChild(buildRdvRow(i, r));
    });
  } else {
    s.slots.forEach(function(nom, i) {
      body.appendChild(buildRow(u.id, i, nom));
    });
  }
  card.appendChild(body);

  // — Bouton ajouter —
  var add = el('button','sadd');
  add.textContent = '+ Ajouter un membre';
  (function(uid, bodyEl) {
    add.addEventListener('click', function() {
      if (uid === 'rdv') state.rdv.slots.push({nom:'', stat:'Occupé'});
      else state[uid].slots.push('');
      var newCard = buildCard(CFG.find(function(c){ return c.id===uid; }));
      card.parentNode.replaceChild(newCard, card);
    });
  })(u.id, body);
  card.appendChild(add);

  // — Drag & drop —
  card.setAttribute('data-uid', u.id);
  activerDrag(card, u.id);

  return card;
}

// ── Row membre normal ──
function buildRow(uid, idx, nom) {
  var row = el('div','slot-row');

  var inp = el('input','sn');
  inp.type = 'text';
  inp.value = nom || '';
  inp.placeholder = '— Libre —';
  inp.autocomplete = 'off';

  // Dropdown autocomplete
  var drop = el('div','acd');
  row.appendChild(inp);
  row.appendChild(drop);

  // Bouton supprimer
  var del = el('button','sdel');
  del.textContent = '✕';
  del.title = 'Retirer';
  row.appendChild(del);

  // Events
  inp.addEventListener('input', function() {
    state[uid].slots[idx] = inp.value;
    showDrop(drop, inp.value, function(choix) {
      state[uid].slots[idx] = choix;
      inp.value = choix;
      drop.style.display = 'none';
    });
  });

  inp.addEventListener('focus', function() {
    showDrop(drop, inp.value, function(choix) {
      state[uid].slots[idx] = choix;
      inp.value = choix;
      drop.style.display = 'none';
    });
  });

  inp.addEventListener('blur', function() {
    setTimeout(function(){ drop.style.display = 'none'; }, 250);
  });

  del.addEventListener('click', function() {
    state[uid].slots.splice(idx, 1);
    renderAll();
  });

  return row;
}

// ── Row RDV ──
function buildRdvRow(idx, r) {
  var row = el('div','slot-row');

  var inp = el('input','sn');
  inp.type = 'text';
  inp.value = r.nom || '';
  inp.placeholder = '— Nom du patient —';
  inp.autocomplete = 'off';

  var drop = el('div','acd');
  row.appendChild(inp);
  row.appendChild(drop);

  // Select statut RDV
  var sel = el('select','rsel '+rdvCls(r.stat));
  ['Occupé','Libre','Pause'].forEach(function(v) {
    var o = document.createElement('option');
    o.value = v; o.textContent = v;
    if (v === r.stat) o.selected = true;
    sel.appendChild(o);
  });
  row.appendChild(sel);

  // Supprimer
  var del = el('button','sdel');
  del.textContent = '✕';
  row.appendChild(del);

  // Events
  inp.addEventListener('input', function() {
    state.rdv.slots[idx].nom = inp.value;
    showDrop(drop, inp.value, function(choix) {
      state.rdv.slots[idx].nom = choix;
      inp.value = choix;
      drop.style.display = 'none';
    });
  });

  inp.addEventListener('focus', function() {
    showDrop(drop, inp.value, function(choix) {
      state.rdv.slots[idx].nom = choix;
      inp.value = choix;
      drop.style.display = 'none';
    });
  });

  inp.addEventListener('blur', function() {
    setTimeout(function(){ drop.style.display = 'none'; }, 250);
  });

  sel.addEventListener('change', function() {
    state.rdv.slots[idx].stat = sel.value;
    sel.className = 'rsel ' + rdvCls(sel.value);
  });

  del.addEventListener('click', function() {
    state.rdv.slots.splice(idx, 1);
    renderAll();
  });

  return row;
}

function rdvCls(v) {
  if (v === 'Libre') return 's-lib';
  if (v === 'Pause') return 's-pau';
  return 's-occ';
}

//  AUTOCOMPLETE
// ══════════════════════════════════════════
// Retourne la liste des employés déjà assignés dans le dispatch (sauf dans le slot courant)
function getAssignes(slotActuel) {
  var assignes = {};
  CFG.forEach(function(u) {
    var s = state[u.id];
    if (!s) return;
    if (u.id === 'rdv') {
      (s.slots||[]).forEach(function(r) {
        var nom = (r.nom||'').trim();
        if (nom && nom !== slotActuel) assignes[nom] = true;
      });
    } else {
      (s.slots||[]).forEach(function(nom) {
        nom = (nom||'').trim();
        if (nom && nom !== slotActuel) assignes[nom] = true;
      });
    }
  });
  return assignes;
}

function showDrop(drop, valeur, onChoix) {
  var val = (valeur || '').toLowerCase().trim();
  // Exclure les employés déjà assignés ailleurs (sauf la valeur actuelle du slot)
  var assignes = getAssignes(valeur.trim());

  var liste = EMPLOYES.filter(function(e) {
    // Exclure si déjà assigné ailleurs
    if (assignes[e]) return false;
    // Filtrer par la saisie
    if (val.length > 0 && e.toLowerCase().indexOf(val) === -1) return false;
    return true;
  });

  if (!liste.length) { drop.style.display = 'none'; return; }

  drop.innerHTML = '';
  liste.forEach(function(e) {
    var item = el('div','aci');
    var nom  = el('span'); nom.textContent = e;

    var badge = el('span','aci-b b-dispo');
    badge.textContent = '✓ Disponible';

    item.appendChild(nom);
    item.appendChild(badge);

    item.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      onChoix(e);
    });

    drop.appendChild(item);
  });

  // Positionner en fixed par rapport à l'input parent
  var inp = drop.previousElementSibling;
  if (inp) {
    var rect = inp.getBoundingClientRect();
    drop.style.top  = (rect.bottom + 4) + 'px';
    // Centré sous l'input, mais jamais hors de l'écran à droite
    var left = rect.left;
    var dropW = 300;
    if (left + dropW > window.innerWidth - 8) {
      left = window.innerWidth - dropW - 8;
    }
    drop.style.left = left + 'px';
  }
  drop.style.display = 'block';
}

// ── SAUVEGARDE ──
function sauvegarder() {
  if (db) {
    // Firebase — partagé entre tous
    db.doc('dispatch/current').set({
      state:   JSON.stringify(state),
      empStat: JSON.stringify(empStatuts),
      ts:      Date.now()
    }).then(function() {
      var h = new Date().toLocaleTimeString('fr-FR');
      document.getElementById('lsave').textContent = 'Sauvegardé à ' + h;
      toast('✔ Sauvegardé — visible par tous');
    }).catch(function(e) {
      console.warn(e);
      sauvegarderLocal();
    });
  } else {
    sauvegarderLocal();
  }
}

function sauvegarderLocal() {
  try {
    localStorage.setItem('omc-dispatch', JSON.stringify(state));
    localStorage.setItem('omc-dispatch-emp', JSON.stringify(empStatuts));
    var h = new Date().toLocaleTimeString('fr-FR');
    document.getElementById('lsave').textContent = 'Sauvegardé à ' + h;
    toast('✔ Sauvegardé (local)');
  } catch(e) { toast('✗ Erreur sauvegarde', true); }
}

function charger() {
  // Chargement local en fallback (Firebase écrase ensuite via onSnapshot)
  try {
    var d = localStorage.getItem('omc-dispatch');
    var e = localStorage.getItem('omc-dispatch-emp');
    if (d) state      = JSON.parse(d);
    if (e) empStatuts = JSON.parse(e);
  } catch(e) { /* silent */ }
}
