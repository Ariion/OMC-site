<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMC — Dispatch Central</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="patch-daltonien.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #080f1e;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            background: #0a1324;
            border-bottom: 2px solid #1e3a5f;
            flex-shrink: 0;
            gap: 16px;
        }
        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .topbar-logo { height: 36px; }
        .topbar-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .topbar-subtitle {
            font-size: 10px;
            color: #64748b;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .back-link {
            color: #38bdf8;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 5px 10px;
            border: 1px solid #1e3a5f;
            border-radius: 4px;
            transition: 0.2s;
        }
        .back-link:hover { background: #1e3a5f; }

        /* HORLOGE LIVE */
        #live-clock {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: #38bdf8;
            letter-spacing: 2px;
            background: #0f172a;
            padding: 4px 14px;
            border-radius: 6px;
            border: 1px solid #1e3a5f;
        }
        #live-date {
            font-size: 10px;
            color: #64748b;
            text-align: center;
            margin-top: 1px;
        }

        /* BADGE TITRE PAGE */
        .page-badge {
            background: #38bdf8;
            color: #0a1324;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ── CONTENU PRINCIPAL ── */
        .dispatch-wrapper {
            flex: 1;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        /* ── SECTION TITRE ── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .section-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #64748b;
            text-transform: uppercase;
        }
        .section-line {
            flex: 1;
            height: 1px;
            background: #1e293b;
        }

        /* ── GRILLE DES UNITÉS ── */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
        }

        /* ── CARTE UNITÉ ── */
        .unit-card {
            background: #0d1b2e;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .unit-card:hover { box-shadow: 0 4px 20px rgba(56,189,248,0.08); }

        .unit-header {
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
        }

        /* Couleurs unités (identiques au Sheets) */
        .unit-ambu1  { background: #3b82f6; }
        .unit-ambu2  { background: #ef4444; }
        .unit-ambu3  { background: #22c55e; }
        .unit-ambu4  { background: #8b5cf6; }
        .unit-ambu5  { background: #f97316; }
        .unit-ambu6  { background: #ec4899; }
        .unit-bob    { background: #eab308; color: #0a1324 !important; }
        .unit-bob .unit-header { color: #0a1324; }
        .unit-centrale { background: #a855f7; }
        .unit-rdv    { background: #64748b; }
        .unit-formation { background: #f59e0b; color: #0a1324 !important; }
        .unit-formation .unit-header { color: #0a1324; }

        /* BADGE STATUT */
        .status-badge {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 0;
        }
        .status-libre    { background: #d1fae5; color: #065f46; }
        .status-occupe   { background: #fee2e2; color: #991b1b; }
        .status-station  { background: #dbeafe; color: #1e3a8a; }
        .status-pause    { background: #fef3c7; color: #92400e; }

        /* SLOTS MEMBRES */
        .unit-slots { padding: 10px 10px 12px; display: flex; flex-direction: column; gap: 6px; }

        .slot {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #111f35;
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            padding: 5px 8px;
            min-height: 32px;
        }
        .slot-name {
            flex: 1;
            font-size: 12px;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
        }
        .slot-name:focus {
            background: #1e3a5f;
            color: white;
        }

        /* SELECT STATUT dans la carte */
        .slot-status {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            outline: none;
            min-width: 64px;
            text-align: center;
            background: #1e3a5f;
            color: #94a3b8;
        }

        /* ── SECTION BAS (RDV + FORMATION) ── */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* ── ZONE RDV ── */
        .rdv-card {
            background: #0d1b2e;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            overflow: hidden;
        }
        .rdv-header {
            background: #475569;
            padding: 8px 14px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .rdv-slots { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .rdv-slot {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #111f35;
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            padding: 5px 10px;
            min-height: 32px;
        }
        .rdv-name {
            flex: 1;
            font-size: 12px;
            color: #e2e8f0;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
        }
        .rdv-name:focus { background: #1e3a5f; color: white; }

        .rdv-status-cell {
            min-width: 80px;
        }
        .rdv-status {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            outline: none;
            width: 100%;
            background: #fca5a5;
            color: #7f1d1d;
        }

        /* ── BOUTONS ACTIONS ── */
        .actions-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-action {
            padding: 9px 18px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-reset  { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .btn-reset:hover  { background: #334155; color: white; }
        .btn-save   { background: #38bdf8; color: #0a1324; font-weight: 700; }
        .btn-save:hover   { background: #0ea5e9; }
        .btn-discord { background: #5865f2; color: white; }
        .btn-discord:hover { background: #4752c4; }

        /* AUTOCOMPLETE DROPDOWN */
        .ac-dropdown {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0 0 6px 6px;
            z-index: 999;
            max-height: 160px;
            overflow-y: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: none;
        }
        .ac-item {
            padding: 7px 12px;
            font-size: 12px;
            color: #e2e8f0;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            transition: background 0.1s;
        }
        .ac-item:hover, .ac-item.selected { background: #38bdf8; color: #0a1324; }

        /* WRAPPER RELATIF pour autocomplete */
        .slot-wrapper { position: relative; flex: 1; }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 24px; right: 24px;
            background: #22c55e;
            color: white;
            font-weight: 600;
            font-size: 13px;
            padding: 10px 20px;
            border-radius: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            z-index: 9999;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.error { background: #ef4444; }

        /* LIGNE VIDE ajoutable */
        .add-slot-btn {
            font-size: 11px;
            color: #475569;
            background: transparent;
            border: 1px dashed #334155;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            transition: 0.2s;
        }
        .add-slot-btn:hover { border-color: #38bdf8; color: #38bdf8; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a1324; }
        ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }

        /* MODE CLAIR */
        body.light-mode { background: #e8edf3; color: #0f172a; }
        body.light-mode .unit-card { background: white; border-color: #cbd5e1; }
        body.light-mode .slot { background: #f1f5f9; border-color: #cbd5e1; }
        body.light-mode .slot-name { color: #0f172a; }
        body.light-mode .slot-name:focus { background: #dbeafe; }
        body.light-mode .rdv-card { background: white; border-color: #cbd5e1; }
        body.light-mode .rdv-slot { background: #f1f5f9; border-color: #cbd5e1; }
        body.light-mode .topbar { background: #1e3a5f; }
        body.light-mode #live-clock { background: #0f172a; }
    </style>
</head>

// ── IMPORT FIREBASE ──
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    projectId: "ocean-medical-center",
    storageBucket: "ocean-medical-center.firebasestorage.app",
    messagingSenderId: "789656238322",
    appId: "1:789656238322:web:42a95fb132ab3b5eda786b"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const DISPATCH_DOC = "dispatch/current";

// ── CONSTANTES ──
const UNITS = ['ambu1','ambu2','ambu3','ambu4','ambu5','ambu6','bob','centrale','formation'];
const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1473838500552900763/elqC43oQ76jAapLRLieQ38oQ53xHteXNdqJ3SrQ-Md_o2spH9a1AZyfhDqI6ruxVQASG';
const UNIT_COLORS = {
    ambu1:'#3b82f6', ambu2:'#ef4444', ambu3:'#22c55e',
    ambu4:'#8b5cf6', ambu5:'#f97316', ambu6:'#ec4899',
    bob:'#eab308', centrale:'#a855f7', formation:'#f59e0b', rdv:'#475569'
};

// ── LISTE DES EMPLOYÉS (depuis la liste dropdown du Sheets) ──
const EMPLOYES = [
    "Louis Brunelle", "Lyrae Greystone", "Gabriella Turner",
    "Logan Edderson", "Raül Menendes", "Alejandro Sanchez",
    "Diana Coin", "Tony Pirely", "Anna White", "Léon White",
    "Valentina Oliviera", "Tino Cruz", "Nezy Frinx",
    "Ford D.Powell", "Gregor Moss"
];

// ── ÉTAT LOCAL ──
let state = {
    units: {},
    rdv: []
};

// Initialise l'état par défaut
function initState() {
    UNITS.forEach(u => {
        state.units[u] = { status: '', membres: ['',''] };
    });
    state.rdv = [{ nom: '', status: 'Occupé' }];
}

// ── HORLOGE ──
function startClock() {
    function tick() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        const s = String(now.getSeconds()).padStart(2,'0');
        const el = document.getElementById('live-clock');
        if (el) el.textContent = `${h}:${m}:${s}`;
        const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
        const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
        const dateEl = document.getElementById('live-date');
        if (dateEl) dateEl.textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    }
    tick(); setInterval(tick, 1000);
}

// ── RENDER ──
function renderAll() {
    UNITS.forEach(u => renderUnit(u));
    renderRdv();
}

function renderUnit(unit) {
    const container = document.getElementById(`slots-${unit}`);
    if (!container) return;

    const u = state.units[unit] || { status:'', membres:['',''] };
    container.innerHTML = '';

    // Statut select
    const sel = document.getElementById(`status-${unit}`);
    if (sel) sel.value = u.status || '';

    // Membres
    (u.membres || []).forEach((nom, idx) => {
        const div = document.createElement('div');
        div.className = 'slot';
        div.innerHTML = `
            <div class="slot-wrapper" style="position:relative;flex:1;">
                <input class="slot-name" type="text" value="${escHtml(nom)}"
                    placeholder="— Libre —"
                    data-unit="${unit}" data-idx="${idx}"
                    autocomplete="off"
                    oninput="handleInput(this)"
                    onfocus="showAC(this)"
                    onblur="hideAC(this)">
                <div class="ac-dropdown" id="ac-${unit}-${idx}"></div>
            </div>
            <button onclick="retirerMembre('${unit}',${idx})" title="Retirer"
                style="background:none;border:none;color:#475569;cursor:pointer;font-size:14px;padding:2px 4px;">✕</button>
        `;
        container.appendChild(div);
    });
}

function renderRdv() {
    const container = document.getElementById('slots-rdv');
    if (!container) return;
    container.innerHTML = '';
    (state.rdv || []).forEach((r, idx) => {
        const div = document.createElement('div');
        div.className = 'slot';
        div.innerHTML = `
            <div class="slot-wrapper" style="position:relative;flex:1;">
                <input class="slot-name" type="text" value="${escHtml(r.nom)}"
                    placeholder="— Nom —"
                    data-rdv="${idx}"
                    autocomplete="off"
                    oninput="handleInputRdv(this)"
                    onfocus="showACRdv(this)"
                    onblur="hideAC(this)">
                <div class="ac-dropdown" id="ac-rdv-${idx}"></div>
            </div>
            <select onchange="updateRdvStatus(${idx}, this.value)"
                style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;border:none;cursor:pointer;background:#fca5a5;color:#7f1d1d;min-width:70px;">
                <option value="Occupé" ${r.status==='Occupé'?'selected':''}>Occupé</option>
                <option value="Libre"  ${r.status==='Libre'?'selected':''}>Libre</option>
                <option value="Pause"  ${r.status==='Pause'?'selected':''}>Pause</option>
            </select>
            <button onclick="retirerRdv(${idx})"
                style="background:none;border:none;color:#475569;cursor:pointer;font-size:14px;padding:2px 4px;">✕</button>
        `;
        container.appendChild(div);
    });
}

// ── AUTOCOMPLETE ──
window.handleInput = function(input) {
    const unit = input.dataset.unit;
    const idx  = parseInt(input.dataset.idx);
    state.units[unit].membres[idx] = input.value;
    showAC(input);
};

window.showAC = function(input) {
    const unit = input.dataset.unit;
    const idx  = parseInt(input.dataset.idx);
    const id   = `ac-${unit}-${idx}`;
    const dropdown = document.getElementById(id);
    if (!dropdown) return;
    const val = input.value.toLowerCase();
    const matches = EMPLOYES.filter(e => e.toLowerCase().includes(val) && e !== '');
    if (matches.length === 0 || val.length < 1) { dropdown.style.display='none'; return; }
    dropdown.innerHTML = matches.map(e =>
        `<div class="ac-item" onmousedown="selectAC('${unit}',${idx},'${escJs(e)}')">${e}</div>`
    ).join('');
    dropdown.style.display = 'block';
};

window.hideAC = function(input) {
    setTimeout(() => {
        const unit = input.dataset.unit || 'rdv';
        const idx  = parseInt(input.dataset.idx ?? input.dataset.rdv ?? 0);
        const isRdv = input.dataset.rdv !== undefined;
        const id = isRdv ? `ac-rdv-${idx}` : `ac-${unit}-${idx}`;
        const d = document.getElementById(id);
        if (d) d.style.display='none';
    }, 200);
};

window.selectAC = function(unit, idx, nom) {
    state.units[unit].membres[idx] = nom;
    renderUnit(unit);
};

window.handleInputRdv = function(input) {
    const idx = parseInt(input.dataset.rdv);
    state.rdv[idx].nom = input.value;
    showACRdv(input);
};

window.showACRdv = function(input) {
    const idx = parseInt(input.dataset.rdv);
    const dropdown = document.getElementById(`ac-rdv-${idx}`);
    if (!dropdown) return;
    const val = input.value.toLowerCase();
    const matches = EMPLOYES.filter(e => e.toLowerCase().includes(val));
    if (matches.length === 0 || val.length < 1) { dropdown.style.display='none'; return; }
    dropdown.innerHTML = matches.map(e =>
        `<div class="ac-item" onmousedown="selectACRdv(${idx},'${escJs(e)}')">${e}</div>`
    ).join('');
    dropdown.style.display = 'block';
};

window.selectACRdv = function(idx, nom) {
    state.rdv[idx].nom = nom;
    renderRdv();
};

// ── ACTIONS ──
window.ajouterSlot = function(unit) {
    state.units[unit].membres.push('');
    renderUnit(unit);
};

window.ajouterSlotRdv = function() {
    state.rdv.push({ nom:'', status:'Occupé' });
    renderRdv();
};

window.retirerMembre = function(unit, idx) {
    state.units[unit].membres.splice(idx, 1);
    renderUnit(unit);
};

window.retirerRdv = function(idx) {
    state.rdv.splice(idx, 1);
    renderRdv();
};

window.updateCardStatus = function(unit) {
    const sel = document.getElementById(`status-${unit}`);
    if (sel) state.units[unit].status = sel.value;
};

window.updateRdvStatus = function(idx, val) {
    state.rdv[idx].status = val;
};

// ── SAUVEGARDE FIREBASE ──
window.sauvegarder = async function() {
    // Lire les valeurs actuelles des inputs
    syncFromDOM();
    try {
        await setDoc(doc(db, "dispatch", "current"), { state: JSON.stringify(state), ts: Date.now() });
        showToast('✓ Dispatch sauvegardé !');
        document.getElementById('last-save').textContent = `Dernière sauvegarde : ${new Date().toLocaleTimeString('fr-FR')}`;
    } catch(e) {
        console.error(e);
        showToast('✗ Erreur Firebase', true);
    }
};

function syncFromDOM() {
    // Sync membres depuis les inputs
    UNITS.forEach(unit => {
        const inputs = document.querySelectorAll(`[data-unit="${unit}"]`);
        state.units[unit].membres = Array.from(inputs).map(i => i.value.trim());
        const sel = document.getElementById(`status-${unit}`);
        if (sel) state.units[unit].status = sel.value;
    });
    // Sync RDV
    const rdvInputs = document.querySelectorAll('[data-rdv]');
    rdvInputs.forEach(i => {
        const idx = parseInt(i.dataset.rdv);
        if (state.rdv[idx]) state.rdv[idx].nom = i.value.trim();
    });
}

// ── ÉCOUTE FIREBASE EN TEMPS RÉEL ──
onSnapshot(doc(db, "dispatch", "current"), (snap) => {
    if (snap.exists()) {
        try {
            const saved = JSON.parse(snap.data().state);
            state = saved;
            renderAll();
            const ts = snap.data().ts;
            if (ts) {
                document.getElementById('last-save').textContent =
                    `Dernière sauvegarde : ${new Date(ts).toLocaleTimeString('fr-FR')}`;
            }
        } catch(e) { console.error('Parse error', e); }
    }
});

// ── RÉINITIALISER ──
window.reinitialiser = function() {
    if (!confirm('Réinitialiser tout le dispatch ? Cette action est irréversible.')) return;
    initState();
    renderAll();
    showToast('Dispatch réinitialisé');
};

// ── DISCORD ──
window.envoyerDiscord = async function() {
    syncFromDOM();
    const UNIT_NAMES = {
        ambu1:'Ambu 1', ambu2:'Ambu 2', ambu3:'Ambu 3',
        ambu4:'Ambu 4', ambu5:'Ambu 5', ambu6:'Ambu 6',
        bob:'Bobologie', centrale:'Centrale', formation:'Formation'
    };
    const STATUS_EMOJI = { libre:'🟢', occupe:'🔴', station:'🔵', pause:'🟡', '':'⚪' };

    let msg = `🏥 **DISPATCH — OCEAN MEDICAL CENTER**\n`;
    msg += `⏰ ${new Date().toLocaleString('fr-FR')}\n`;
    msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

    UNITS.forEach(u => {
        const unit = state.units[u];
        const membres = (unit.membres || []).filter(m => m.trim() !== '');
        const emoji = STATUS_EMOJI[unit.status] || '⚪';
        const statusLabel = unit.status ? unit.status.toUpperCase() : '—';
        msg += `**${emoji} ${UNIT_NAMES[u]}** — ${statusLabel}\n`;
        if (membres.length > 0) {
            membres.forEach(m => { msg += `  • ${m}\n`; });
        } else {
            msg += `  *(Vide)*\n`;
        }
        msg += '\n';
    });

    const rdvActifs = (state.rdv || []).filter(r => r.nom.trim() !== '');
    if (rdvActifs.length > 0) {
        msg += `**📅 RENDEZ-VOUS**\n`;
        rdvActifs.forEach(r => { msg += `  • ${r.nom} — ${r.status}\n`; });
    }

    msg += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;

    try {
        const res = await fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: 'Dispatch OMC', content: msg })
        });
        if (res.ok) showToast('✓ Envoyé sur Discord !');
        else throw new Error();
    } catch(e) {
        showToast('✗ Erreur Discord', true);
    }
};

// ── UTILS ──
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escJs(s)   { return (s||'').replace(/'/g,"\\'"); }

function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'show error' : 'show';
    setTimeout(() => t.className = '', 3000);
}

// ── THÈME ──
window.toggleTheme = function() {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    localStorage.setItem('omc-theme', isLight ? 'light' : 'dark');
    const btn = document.getElementById('theme-text');
    if (btn) btn.textContent = isLight ? 'Mode sombre' : 'Mode clair';
};

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
    // Thème sauvegardé
    if (localStorage.getItem('omc-theme') === 'light') {
        document.body.classList.add('light-mode');
        const btn = document.getElementById('theme-text');
        if (btn) btn.textContent = 'Mode sombre';
    }
    startClock();
    initState();
    renderAll();
});
</script>
